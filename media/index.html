<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{CSS_URI}}">
</head>
<body>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-header">Presets</div>
    <div class="preset-list" id="presetList"></div>
    <div class="sidebar-footer">
      <button id="newBtn">+ New Preset</button>
    </div>
  </div>

  <div class="editor">
    <div class="empty-editor" id="emptyState">
      Select a preset or create a new one
    </div>
    <div class="editor-content" id="editorContent">
      <div class="card">
        <div class="card-header">Preset</div>
        <div class="preset-header">
          <input type="text" id="presetName" placeholder="Preset name" />
          <span id="activeBadge" class="active-pill inactive">Not active</span>
        </div>
      </div>

      <div class="card">
        <div class="card-header">Setting</div>
        <div class="form-row">
          <label for="templateSelect">Template</label>
          <select id="templateSelect">
            <option value="">Custom (blank)</option>
            <option value="claudeCode.environmentVariables">Claude Code: Environment Variables</option>
            <option value="python.defaultInterpreterPath">Python: Default Interpreter Path</option>
            <option value="git.path">Git: Executable Path</option>
          </select>
        </div>
        <div class="form-row">
          <label for="settingKey">Setting Key</label>
          <input type="text" id="settingKey" placeholder="e.g. python.defaultInterpreterPath" />
        </div>
        <div class="form-row">
          <label for="settingValue">Value (JSON)</label>
          <textarea id="settingValue" rows="10" placeholder='"/usr/bin/python3.11"&#10;or&#10;[{ "name": "ANTHROPIC_BASE_URL", "value": "https://..." }]'></textarea>
          <div class="hint">Enter any valid JSON: strings need quotes, numbers and booleans do not.</div>
        </div>
      </div>

      <div class="actions">
        <button id="deleteBtn" class="btn" disabled>Delete</button>
        <span class="spacer"></span>
        <button id="saveBtn" class="btn">Save</button>
        <button id="activateBtn" class="btn" disabled>Activate</button>
      </div>
    </div>
  </div>
</div>

<script src="{{JS_URI}}"></script>
</body>
</html>
